name: Build

permissions:
  contents: read
  packages: write

on:
  pull_request:
  push:
    branches:
      - main

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install protobuf
      run: |
        sudo apt-get update
        sudo apt-get install protobuf-compiler gcc-aarch64-linux-gnu

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

    - name: Build x86_64-unknown-linux-gnu release
      run: |
        cargo build --target=x86_64-unknown-linux-gnu --release

    - name: Build x86_64-unknown-linux-gnu debug
      run: |
        cargo build --target=x86_64-unknown-linux-gnu

    - name: Build aarch64-unknown-linux-gnu release
      run: |
        cargo build --target=aarch64-unknown-linux-gnu --release

    - name: Build aarch64-unknown-linux-gnu debug
      run: |
        cargo build --target=aarch64-unknown-linux-gnu

    - name: Upload x86_64-unknown-linux-gnu release
      uses: actions/upload-artifact@v4
      with:
        name: bb_runner-x86_64
        path: target/x86_64-unknown-linux-gnu/release/bb_runner

    - name: Upload x86_64-unknown-linux-gnu debug
      uses: actions/upload-artifact@v4
      with:
        name: bb_runner-x86_64-dbg
        path: target/x86_64-unknown-linux-gnu/debug/bb_runner

    - name: Upload aarch64-unknown-linux-gnu release
      uses: actions/upload-artifact@v4
      with:
        name: bb_runner-aarch64
        path: target/aarch64-unknown-linux-gnu/release/bb_runner

    - name: Upload aarch64-unknown-linux-gnu debug
      uses: actions/upload-artifact@v4
      with:
        name: bb_runner-aarch64-dbg
        path: target/aarch64-unknown-linux-gnu/debug/bb_runner

  container:
    name: Container
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push container image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
